# Netlify build & SPA-routing config for Task Tracker (Vite static SPA).
# Set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in the Netlify UI
# (Site configuration -> Environment variables), not here.
#
# Security response headers live in `public/_headers` (copied to dist/ by Vite),
# which BOTH Netlify and Cloudflare Pages read — keeping the headers host-agnostic.
# A full resource Content-Security-Policy is intentionally NOT enabled yet: the
# inline theme script in index.html plus BlockNote's inline styles would need a
# hash/nonce, so enable it only after smoke-testing on a deploy preview.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page-app fallback so deep links (e.g. /project/:id) resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
